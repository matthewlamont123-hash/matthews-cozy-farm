<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Toy Soil 2.0 — Farm Discovery Empire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="shell">
      <header class="topbar card-layer">
        <div class="brand">
          <span class="brand-mark">🌱</span>
          <div>
            <strong>Toy Soil 2.0</strong>
            <div class="muted tiny brand-sub">Farm Discovery Empire</div>
          </div>
        </div>
        <div class="economy">
          <button type="button" class="pill daily hidden" id="btn-daily" title="Claim your daily cozy gift">
            <span class="pill-icon">🎁</span>
            <span id="daily-label">Daily</span>
          </button>
          <div class="coin-sticker" aria-live="polite">
            <span class="sticker-shine"></span>
            <span class="sticker-icon">🪙</span>
            <span id="coins">120</span>
          </div>
          <button type="button" class="pill sack" id="btn-capacity" aria-live="polite" title="Open satchel">
            <span class="pill-icon">🎒</span>
            <span id="capacity">0 / 16</span>
          </button>
          <button type="button" class="pill ghost" id="btn-reset">↺ Reset</button>
          <span class="pill badge" id="season-badge" title="Active season">🌸 Spring</span>
          <span class="pill badge" id="weather-badge" title="Current weather">☀️ Sunny</span>
          <span class="pill badge field-badge" id="field-badge" title="Active field">🌱 Starter Field</span>
          <span class="pill badge prestige hidden" id="prestige-badge" title="Prestige level">⭐ 0</span>
          <span class="pill badge event-banner hidden" id="event-banner" aria-live="polite"></span>
        </div>
      </header>

      <nav id="field-strip" class="field-bar" aria-label="Your farm fields"></nav>

      <main class="stage card-layer">
        <canvas id="game" tabindex="0" aria-label="Farm grid"></canvas>
        <div id="automation-bar" class="automation-bar card-layer" aria-live="polite">
          <span class="auto-label">Helpers:</span>
          <span id="automation-status">None yet</span>
          <span class="auto-divider">·</span>
          <span id="tractor-status" class="tractor-status">🚜 No tractor</span>
        </div>
        <div id="combo-badge" class="combo-badge hidden" aria-live="polite"></div>
        <div id="toast" class="toast" role="status" aria-live="polite"></div>

        <nav class="toy-dock card-layer" aria-label="Tools">
          <button type="button" data-tool="hoe" class="toy-btn active">
            <span class="icon-circle">🪓</span>
            <span>Till</span>
          </button>
          <button type="button" data-tool="plant" class="toy-btn">
            <span class="icon-circle">🌱</span>
            <span>Plant</span>
          </button>
          <button type="button" data-tool="water" class="toy-btn">
            <span class="icon-circle">💧</span>
            <span>Water</span>
          </button>
          <button type="button" data-tool="harvest" class="toy-btn">
            <span class="icon-circle">🧺</span>
            <span>Harvest</span>
          </button>
          <span class="dock-divider"></span>
          <button type="button" class="toy-btn wide" id="btn-shop">
            <span class="icon-circle catalog">📖</span>
            <span>Shop</span>
          </button>
          <button type="button" class="toy-btn wide" id="btn-upgrades">
            <span class="icon-circle">⭐</span>
            <span>Upgrades</span>
          </button>
          <button type="button" class="toy-btn wide ghost" id="btn-inventory">
            <span class="icon-circle">🧺</span>
            <span>Satchel</span>
          </button>
          <button type="button" class="toy-btn wide" id="btn-empire">
            <span class="icon-circle">🏰</span>
            <span>Empire</span>
          </button>
          <button type="button" class="toy-btn wide ghost" id="btn-journal">
            <span class="icon-circle">📔</span>
            <span>Journal</span>
          </button>
        </nav>
      </main>
    </div>

    <div id="backdrop" class="backdrop hidden" aria-hidden="true"></div>

    <aside id="panel-shop" class="catalog-panel hidden" aria-hidden="true">
      <div class="catalog-inner card-layer">
        <div class="panel-head">
          <h2>Shop</h2>
          <button type="button" class="btn-close" data-close="shop">&times;</button>
        </div>
        <div id="shop-rows" class="catalog-grid"></div>
      </div>
    </aside>

    <aside id="panel-upgrades" class="panel card-layer wide hidden" aria-hidden="true">
      <div class="panel-head">
        <h2>Upgrade grove</h2>
        <button type="button" class="btn-close" data-close="upgrades">&times;</button>
      </div>
      <div id="upgrade-columns" class="upgrade-grid"></div>
    </aside>

    <aside id="panel-inventory" class="tray hidden" aria-hidden="true">
      <div class="tray-handle"></div>
      <div class="tray-inner card-layer">
        <div class="panel-head">
          <h2>Harvest satchel</h2>
          <button type="button" class="btn-close" data-close="inventory">&times;</button>
        </div>
        <div class="inv-meta muted small" id="inv-meta"></div>
        <div class="inv-actions">
          <button type="button" class="primary big" id="btn-sell">Sell all</button>
          <button type="button" class="ghost-btn" id="btn-sort" title="Sort by rarity">↕ Sort</button>
        </div>
        <div id="inv-rows" class="rows"></div>
      </div>
    </aside>

    <div id="plant-bar" class="plant-bar card-layer">
      <label for="crop-select">Planting:</label>
      <select id="crop-select"></select>
    </div>

    <aside id="panel-journal" class="panel card-layer wide hidden" aria-hidden="true">
      <div class="panel-head">
        <h2>Farm journal</h2>
        <button type="button" class="btn-close" data-close="journal">&times;</button>
      </div>
      <nav class="journal-tabs" aria-label="Journal sections">
        <button type="button" class="tab active" data-tab="quests">Quests</button>
        <button type="button" class="tab" data-tab="discover">Discover</button>
        <button type="button" class="tab" data-tab="breed">Breed</button>
        <button type="button" class="tab" data-tab="achieve">Badges</button>
        <button type="button" class="tab" data-tab="prestige">Prestige</button>
      </nav>
      <div id="journal-quests" class="journal-section"></div>
      <div id="journal-discover" class="journal-section hidden"></div>
      <div id="journal-breed" class="journal-section hidden"></div>
      <div id="journal-achieve" class="journal-section hidden"></div>
      <div id="journal-prestige" class="journal-section hidden"></div>
    </aside>

    <aside id="panel-empire" class="panel card-layer wide hidden" aria-hidden="true">
      <div class="panel-head">
        <h2>Farm empire</h2>
        <button type="button" class="btn-close" data-close="empire">&times;</button>
      </div>
      <div id="empire-stats" class="empire-stats muted small"></div>
      <div id="empire-fields" class="empire-grid"></div>
      <h3 class="empire-subhead">Tractors</h3>
      <div id="empire-tractors" class="empire-grid"></div>
    </aside>

    <div id="celebration" class="celebration hidden" aria-live="polite">
      <div class="celebration-inner card-layer">
        <div class="celebration-emoji" id="celebration-emoji">✨</div>
        <strong id="celebration-title">Discovered!</strong>
        <p id="celebration-name" class="muted"></p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
